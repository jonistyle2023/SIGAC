name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend — build JAR → Docker image → ECR → ECS Fargate
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECS Fargate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:$IMAGE_TAG .
          docker push     $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:$IMAGE_TAG
          docker tag      $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:$IMAGE_TAG \
                          $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:latest
          docker push     $ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:latest
          echo "image=$ECR_REGISTRY/${{ secrets.ECR_REPO_BACKEND }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-def.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-def.json
          container-name:   ${{ secrets.ECS_CONTAINER_NAME }}
          image:            ${{ steps.build-backend.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:  ${{ steps.render-task-def.outputs.task-definition }}
          service:          ${{ secrets.ECS_SERVICE }}
          cluster:          ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ──────────────────────────────────────────────────────────────────────────────
  # Frontend — npm build → S3 → CloudFront invalidation
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        working-directory: react-app
        run: npm ci --silent

      - name: Build
        working-directory: react-app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync react-app/dist/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp react-app/dist/index.html s3://${{ secrets.S3_BUCKET_FRONTEND }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"