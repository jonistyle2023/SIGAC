# Dev profile — activated with -Dspring.profiles.active=dev (or SPRING_PROFILES_ACTIVE=dev)
# NEVER use these values in production.

# JWT secret for local dev (exactly 64 bytes)
jwt.secret=dev-only-insecure-secret-for-local-development-only-do-not-use-in-prod-aabbccdd

cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

bootstrap.secret=dev-bootstrap-secret

# Use H2 in-memory DB so dev works without MySQL
spring.datasource.url=jdbc:h2:mem:sigacdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway no aplica en dev (H2 usa ddl-auto)
spring.flyway.enabled=false

# Verbose logging is fine in dev
logging.level.com.example.sigac=DEBUG
logging.level.org.springframework.security=DEBUG
