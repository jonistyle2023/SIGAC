spring.application.name=SIGAC

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

server.port=8080
server.servlet.context-path=/

jwt.secret=sigacSystemJwtSecretKeyForAuthenticationAndAuthorizationPurposesOnly12345
jwt.expiration=86400000

logging.level.root=INFO
logging.level.com.example.sigac=DEBUG
logging.level.org.springframework.security=DEBUG

# AWS S3 — requiere AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY y AWS_REGION en el entorno
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET:sigac-dev}

# Módulo 4: Clasificación IA (Google Gemini)
# Obtén tu clave gratuita en https://aistudio.google.com/apikey
# Sin GEMINI_API_KEY: usa clasificación por reglas (fallback automático)
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash
